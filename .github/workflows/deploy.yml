name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stage:
        description: "SST stage to deploy"
        required: true
        type: choice
        options:
          - production
          - dev
      ref:
        description: "Git ref to deploy (tag, branch, or SHA). Defaults to current default branch HEAD."
        required: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ inputs.stage || 'dev' }}
  cancel-in-progress: ${{ (inputs.stage || 'dev') != 'production' }}

jobs:
  esc-eval-go:
    name: Build ESC eval bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: esc-eval/go.mod
          cache: true
          cache-dependency-path: esc-eval/go.sum

      - name: Download Go modules
        run: cd esc-eval && go mod download

      - name: Vet Go code
        run: cd esc-eval && go vet ./...

      - name: Test Go code
        run: cd esc-eval && go test ./... -race -count=1

      - name: Build ESC eval bootstrap
        run: cd esc-eval && make build

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v7
        with:
          name: esc-eval-bootstrap
          path: .build/esc-eval/bootstrap
          if-no-files-found: error

  deploy:
    uses: ./.github/workflows/deploy-sst.yml
    needs: [esc-eval-go]
    permissions:
      id-token: write
      contents: read
    with:
      stage: ${{ inputs.stage || 'dev' }}
      ref: ${{ inputs.ref || '' }}
    secrets: inherit
