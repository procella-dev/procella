name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Build Lambda binaries
        run: |
          mkdir -p .build/api .build/gc
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/lambda-bootstrap.ts --outfile .build/api/bootstrap
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/gc-bootstrap.ts --outfile .build/gc/bootstrap

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}

      - name: Unlock stale state
        run: npx sst unlock --stage production
        continue-on-error: true

      - name: Deploy
        run: npx sst deploy --stage production
        env:
          SST_SECRET_ProcellaEncryptionKey: ${{ secrets.PROCELLA_ENCRYPTION_KEY }}
          SST_SECRET_ProcellaDevAuthToken: ${{ secrets.PROCELLA_DEV_AUTH_TOKEN }}
          SST_SECRET_ProcellaDescopeManagementKey: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}

      - name: Run database migrations
        shell: bash {0}
        run: |
          CLUSTER_ID=$(aws rds describe-db-clusters \
            --query "DBClusters[?starts_with(DBClusterIdentifier, 'procella-production')].DBClusterIdentifier | [0]" \
            --output text)
          CLUSTER_ARN=$(aws rds describe-db-clusters --db-cluster-identifier "$CLUSTER_ID" \
            --query "DBClusters[0].DBClusterArn" --output text)
          PROXY_NAME=$(aws rds describe-db-proxies \
            --query "DBProxies[?starts_with(DBProxyName, 'procella-production')].DBProxyName | [0]" \
            --output text)
          SECRET_ARN=$(aws rds describe-db-proxies --db-proxy-name "$PROXY_NAME" \
            --query "DBProxies[0].Auth[0].SecretArn" --output text)
          for SQL_FILE in packages/db/drizzle/0000_medical_fabian_cortez.sql packages/db/drizzle/0001_add_journal_entries.sql packages/db/drizzle/0002_extend_journal_entries.sql; do
            echo "Applying migration: $SQL_FILE"
            SQL=$(cat "$SQL_FILE")
            aws rds-data execute-statement \
              --resource-arn "$CLUSTER_ARN" \
              --secret-arn "$SECRET_ARN" \
              --database "procella" \
              --sql "$SQL" 2>&1 || echo "Migration may have already been applied: $SQL_FILE"
          done

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | \`production\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | \`us-east-1\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URLs:**" >> $GITHUB_STEP_SUMMARY
          echo "- API: https://api.procella.cloud" >> $GITHUB_STEP_SUMMARY
          echo "- App: https://app.procella.cloud" >> $GITHUB_STEP_SUMMARY
          echo "- Docs: https://docs.procella.cloud" >> $GITHUB_STEP_SUMMARY
