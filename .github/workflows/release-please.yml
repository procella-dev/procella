name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    concurrency:
      group: release-please-${{ github.ref }}
      cancel-in-progress: true
    name: Create Release PR
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs['.--release_created'] }}
      tag_name: ${{ steps.release.outputs['.--tag_name'] }}
      migrate_released: ${{ steps.release.outputs['packages/migrate--release_created'] }}
    steps:
      - name: Get GitHub App token
        id: get_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.get_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  deploy-production:
    name: Deploy Production
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/deploy-sst.yml
    permissions:
      id-token: write
      contents: read
    with:
      stage: production
      ref: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  publish-migrate:
    name: Publish @procella/migrate
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.migrate_released == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun

      - name: Verify quality gates
        run: |
          bunx biome check packages/migrate/
          bun run typecheck
          bun test packages/migrate/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build for distribution
        working-directory: packages/migrate
        run: |
          bunx tsc --outDir dist
          # Ensure shebang is preserved and cli.js is executable
          if [ -f dist/cli.js ] && ! head -n 1 dist/cli.js | grep -qx '#!/usr/bin/env node'; then
            { printf '%s\n' '#!/usr/bin/env node'; cat dist/cli.js; } > dist/cli.js.tmp && mv -f dist/cli.js.tmp dist/cli.js
          fi
          chmod +x dist/cli.js
          # Generate a publish-ready package.json with compiled paths
          bun -e '
            const pkg = require("./package.json");
            const dist = {
              name: pkg.name,
              version: pkg.version,
              description: pkg.description,
              type: pkg.type,
              license: pkg.license,
              repository: pkg.repository,
              keywords: pkg.keywords,
              engines: pkg.engines,
              bin: { "procella-migrate": "cli.js" },
              main: "index.js",
              types: "index.d.ts",
              exports: { ".": { import: "./index.js", types: "./index.d.ts" } },
            };
            require("fs").writeFileSync("dist/package.json", JSON.stringify(dist, null, 2));
          '
          cp -f ../../LICENSE dist/ 2>/dev/null || true

      - name: Publish to npm
        working-directory: packages/migrate/dist
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
