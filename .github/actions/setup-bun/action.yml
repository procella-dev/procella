name: Setup Bun Workspace
description: Install Bun via mise, restore cache, and install dependencies. Requires actions/checkout BEFORE this action.

runs:
  using: composite
  steps:

    - uses: jdx/mise-action@v4

    - uses: actions/cache@v5
      with:
        path: |
          node_modules
          ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - run: bun install --frozen-lockfile
      shell: bash
